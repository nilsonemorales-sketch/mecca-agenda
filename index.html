}

function toggleSection(id){
  const el=document.getElementById(id);
  if(el) el.style.display=el.style.display==='none'?'block':'none';
}

// Download photos for WhatsApp sharing
async function descargarFotos(fotos, fecha, area){
  if(!fotos||!fotos.length) return;
  setSS('syncing','Preparando fotos...');
  try{
    for(let i=0;i<fotos.length;i++){
      const url=fotos[i];
      const r=await fetch(url);
      const blob=await r.blob();
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=`MeccaResidence_${fecha}_${area.replace(/[^a-z0-9]/gi,'_')}_${i+1}.jpg`;
      a.click();
      await new Promise(r=>setTimeout(r,400));
    }
    setSS('ok',`${fotos.length} foto${fotos.length>1?'s':''}  descargada${fotos.length>1?'s':''} ✓`);
  }catch(e){ setSS('err','Error descargando'); }
}

function exportarHistorialPDF(uid_){
  try{
    const{jsPDF}=window.jspdf;
    const u=USERS[uid_];
    if(!u)return;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210,M=14,RW=W-2*M;let y=0;

    function safe(s){if(!s)return'';return String(s).replace(/[\uD800-\uDFFF]/g,'').replace(/[^\x20-\x7E\xC0-\xD6\xD8-\xF6\xF8-\xFF]/g,'').replace(/\s+/g,' ').trim();}
    function fc(c){doc.setFillColor(c[0],c[1],c[2]);}
    function tc(c){doc.setTextColor(c[0],c[1],c[2]);}
    function dc(c){doc.setDrawColor(c[0],c[1],c[2]);}
    const DARK=[20,20,35],BDX_PUR=[107,35,142],BDX_GRN=[45,110,45];
    const GRN=[47,158,68],ACC=[26,86,219],AMB=[224,138,0],RED=[224,49,49];
    const WHT=[255,255,255],BOR=[222,226,230],TXT=[33,37,41],MUT=[108,117,125];
    const ESTADO_L={'completado':'COMPLETADO','en-progreso':'EN PROGRESO','pendiente':'PENDIENTE','pausada':'PAUSADA'};
    const ESTADO_C={'completado':GRN,'en-progreso':ACC,'pendiente':MUT,'pausada':AMB};

    const per=S.histFecha&&S.histFechaFin?fmtF(S.histFecha)+' al '+fmtF(S.histFechaFin):S.histFecha?'Desde '+fmtF(S.histFecha):'Todos los registros';

    function drawHeader(){
      fc(DARK);doc.rect(0,0,W,24,'F');
      fc(BDX_PUR);doc.rect(0,0,4,24,'F');
      tc(WHT);doc.setFontSize(12);doc.setFont('helvetica','bold');
      doc.text('BRIDEX SRL',M,9);
      tc([180,180,200]);doc.setFontSize(6.5);doc.setFont('helvetica','normal');
      doc.text('Arquitectura  Urbanismo  Construccion',M,14.5);
      tc([200,215,255]);doc.setFontSize(7.5);doc.setFont('helvetica','bold');
      doc.text('PROYECTO: MECCA RESIDENCE 2026',M,20);
      tc([160,180,220]);doc.setFontSize(7);doc.setFont('helvetica','normal');
      doc.text('HISTORIAL DE INGENIERO',W-M,9,{align:'right'});
      doc.text(per,W-M,14.5,{align:'right'});
      doc.text('Pag. '+doc.internal.getCurrentPageInfo().pageNumber,W-M,20,{align:'right'});
      fc(BDX_GRN);doc.rect(0,24,W,1.5,'F');
    }
    function chk(h){if(y+h>280){doc.addPage();drawHeader();y=32;}}

    drawHeader();y=32;

    const myActs=(S.histActs||[]).filter(a=>a.ingeniero_id===uid_);
    const myPens=(S.histPens||[]).filter(p=>p.personal_nombre===u.nombre);
    const myComp=myActs.filter(a=>a.estado==='completado').length;

    // Nombre del ingeniero + resumen
    chk(22);
    fc([240,235,255]);doc.roundedRect(M,y,RW,18,2,2,'F');
    fc(BDX_PUR);doc.roundedRect(M,y,3,18,1,1,'F');
    tc([107,35,142]);doc.setFontSize(13);doc.setFont('helvetica','bold');
    doc.text(safe(u.nombre),M+7,y+8);
    tc(MUT);doc.setFontSize(8.5);doc.setFont('helvetica','normal');
    doc.text(safe(u.rol||'Ingeniero'),M+7,y+14);
    // Stats derecha
    var boxes2=[{l:'Actividades',v:myActs.length,c:ACC},{l:'Completadas',v:myComp,c:GRN},{l:'Situaciones',v:myPens.length,c:myPens.length>0?RED:MUT}];
    var bw2=28;
    boxes2.forEach(function(b,i){
      var bx=W-M-3*(bw2+3)+i*(bw2+3);
      fc(b.c);doc.roundedRect(bx,y+2,bw2,14,1.5,1.5,'F');
      tc(WHT);doc.setFontSize(13);doc.setFont('helvetica','bold');
      doc.text(String(b.v),bx+bw2/2,y+10.5,{align:'center'});
      doc.setFontSize(6);doc.setFont('helvetica','normal');
      doc.text(b.l,bx+bw2/2,y+15,{align:'center'});
    });
    y+=23;

    if(myActs.length){
      chk(12);
      fc(DARK);doc.roundedRect(M,y,RW,9,1.5,1.5,'F');
      fc(BDX_PUR);doc.rect(M,y,3,9,'F');
      tc(WHT);doc.setFontSize(9);doc.setFont('helvetica','bold');
      doc.text('ACTIVIDADES REGISTRADAS  ('+myActs.length+')',M+8,y+6);y+=13;
      myActs.forEach(function(a){
        chk(22);
        var ec=ESTADO_C[a.estado]||MUT;
        var el=ESTADO_L[a.estado]||safe(a.estado).toUpperCase();
        tc(TXT);doc.setFontSize(8.5);doc.setFont('helvetica','bold');
        var tl=doc.splitTextToSize('['+a.fecha+']  '+safe(a.descripcion),RW-32);
        tl.forEach(function(l){chk(5);doc.text(l,M+4,y);y+=5;});
        // Badge estado
        var bx3=M+4;
        doc.setFontSize(6.5);
        var bw3=doc.getTextWidth(el)+6;if(bw3<12)bw3=12;
        fc(ec);doc.roundedRect(bx3,y-4.5,bw3,5.5,1,1,'F');
        tc(WHT);doc.text(el,bx3+3,y);bx3+=bw3+3;
        y+=7;
        tc(MUT);doc.setFontSize(7.5);doc.setFont('helvetica','normal');
        var meta=[];
        if(a.area) meta.push('Ubic: '+safe(a.area));
        if(a.personal_nombre) meta.push('Trab: '+safe(a.personal_nombre));
        if(a.porcentaje>0) meta.push('Avance: '+a.porcentaje+'%');
        if(meta.length){chk(5);doc.text(meta.join('   '),M+4,y);y+=5;}
        if(a.notas){
          chk(5);tc([130,130,130]);doc.setFontSize(7.5);doc.setFont('helvetica','italic');
          var nl3=doc.splitTextToSize('Obs: '+safe(a.notas),RW-10);
          nl3.forEach(function(l){chk(4);doc.text(l,M+4,y);y+=4;});
        }
        y+=2;dc(BOR);doc.setLineWidth(0.15);doc.line(M+4,y,W-M-4,y);y+=4;
      });
    }

    if(myPens.length){
      chk(12);
      fc(RED);doc.roundedRect(M,y,RW,9,1.5,1.5,'F');
      tc(WHT);doc.setFontSize(9);doc.setFont('helvetica','bold');
      doc.text('SITUACIONES REGISTRADAS  ('+myPens.length+')',M+4,y+6);y+=13;
      myPens.forEach(function(p){
        chk(12);
        tc(TXT);doc.setFontSize(8.5);doc.setFont('helvetica','bold');
        doc.text(p.fecha+'  —  '+safe(p.tipo),M+4,y);y+=5;
        if(p.descripcion){
          tc([140,140,140]);doc.setFontSize(7.5);doc.setFont('helvetica','italic');
          var dl2=doc.splitTextToSize(safe(p.descripcion),RW-8);
          dl2.forEach(function(l){chk(4);doc.text(l,M+8,y);y+=4;});
        }
        y+=3;dc(BOR);doc.setLineWidth(0.15);doc.line(M+4,y,W-M-4,y);y+=4;
      });
    }

    // Pie de página
    const tp=doc.internal.getNumberOfPages();
    for(var pi2=1;pi2<=tp;pi2++){
      doc.setPage(pi2);
      fc([245,246,248]);doc.rect(0,286,W,11,'F');
      dc(BOR);doc.setLineWidth(0.3);doc.line(0,286,W,286);
      fc(BDX_PUR);doc.rect(0,286,4,11,'F');
      tc(MUT);doc.setFontSize(7);doc.setFont('helvetica','normal');
      doc.text('BRIDEX SRL  |  Mecca Residence 2026  |  Historial de Ingeniero',M+3,292);
      doc.text('Generado: '+new Date().toLocaleDateString('es-DO')+' '+(new Date().toLocaleTimeString('es-DO',{hour:'2-digit',minute:'2-digit'})),W-M,292,{align:'right'});
    }

    doc.save('BRIDEX_Historial_'+safe(u.nombre).replace(/\s+/g,'_')+'_'+new Date().toISOString().slice(0,10)+'.pdf');
  }catch(e){alert('Error generando PDF: '+e.message);}
}

async function loadFotos(){
  const el=document.getElementById('c-fotos');
  if(!el)return;
  if(!isAdmin()){
    el.innerHTML=`<div class="empty" style="padding:40px 20px">
      <div style="font-size:32px;margin-bottom:12px">🔒</div>
      <div style="font-size:14px;font-weight:500;color:var(--text2);margin-bottom:6px">Acceso restringido</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:16px">La galería de fotos es exclusiva del Administrador</div>
      <button class="ibtn primary" onclick="requireEdit(()=>loadFotos())" style="margin:0 auto">Iniciar sesión como Admin</button>
    </div>`;
    return;
  }
  setSS('syncing','Cargando fotos...');
  el.innerHTML='<div class="empty"><div class="spinner"></div><br><br>Cargando fotos...</div>';
  try{
    let q='obra_actividades?fotos=neq.&order=fecha.desc,created_at.desc&limit=100';
    if(S.fotosFecha) q+=`&fecha=gte.${S.fotosFecha}`;
    if(S.fotosFechaFin) q+=`&fecha=lte.${S.fotosFechaFin}`;
    if(S.fotosFiltroIng!=='todos') q+=`&ingeniero_id=eq.${S.fotosFiltroIng}`;
    const acts=await sb(q);
    // Filter only those with actual fotos
    S.fotosData=acts.filter(a=>(a.fotos||'').split('||').filter(Boolean).length>0);
    setSS('ok','✓ '+hhmm());
    renderFotos();
  }catch(e){setSS('err','Error cargando fotos');}
}

function renderFotos(){
  const el=document.getElementById('c-fotos');
  if(!el)return;

  const ingFiltros=[
    {id:'todos',label:'Todos'},
    ...Object.entries(USERS).map(([k,u])=>({id:k,label:u.nombre.split(' ').slice(-1)[0],color:u.color}))
  ];

  // Get all unique ubicaciones from fotos data
  const ubicsList=[...new Set(S.fotosData.map(a=>a.area||'Sin ubicación'))].sort();

  // Apply ubicacion filter
  let data=S.fotosData;
  if(S.fotosFiltroUbic) data=data.filter(a=>(a.area||'Sin ubicación')===S.fotosFiltroUbic);

  // Group by date
  const byFecha={};
  data.forEach(a=>{
    const f=a.fecha||'Sin fecha';
    if(!byFecha[f])byFecha[f]=[];
    byFecha[f].push(a);
  });
  const fechas=Object.keys(byFecha).sort().reverse();

  // Count total fotos
  const totalFotos=data.reduce((acc,a)=>(a.fotos||'').split('||').filter(Boolean).length+acc,0);

  el.innerHTML=`
    <!-- FILTROS -->
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:12px">
      <div style="font-size:11px;font-family:var(--mono);color:var(--text3);margin-bottom:8px">FILTRAR FOTOS · ${totalFotos} foto${totalFotos!==1?'s':''}</div>

      <div style="font-size:10px;font-family:var(--mono);color:var(--text3);margin-bottom:5px">RESPONSABLE</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
        ${ingFiltros.map(f=>`<button onclick="S.fotosFiltroIng='${f.id}';loadFotos()" style="padding:5px 11px;border-radius:14px;border:1px solid ${S.fotosFiltroIng===f.id?'var(--accent)':'var(--border2)'};background:${S.fotosFiltroIng===f.id?'rgba(200,240,96,.12)':'var(--bg3)'};color:${S.fotosFiltroIng===f.id?'var(--accent)':'var(--text2)'};font-size:11px;font-family:var(--mono);cursor:pointer;white-space:nowrap">${f.label}</button>`).join('')}
      </div>

      <div style="font-size:10px;font-family:var(--mono);color:var(--text3);margin-bottom:5px">UBICACIÓN</div>
      <select class="sel" style="margin-bottom:10px;font-size:13px" onchange="S.fotosFiltroUbic=this.value;renderFotos()">
        <option value="">Todas las ubicaciones</option>
        ${ubicsList.map(u=>`<option value="${u}" ${S.fotosFiltroUbic===u?'selected':''}>${esc(u)}</option>`).join('')}
      </select>

      <div style="font-size:10px;font-family:var(--mono);color:var(--text3);margin-bottom:5px">RANGO DE FECHAS</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
        <div class="fw" style="margin-bottom:0"><label class="fl">Desde</label>
          <input type="date" value="${S.fotosFecha||''}" onchange="S.fotosFecha=this.value;loadFotos()"></div>
        <div class="fw" style="margin-bottom:0"><label class="fl">Hasta</label>
          <input type="date" value="${S.fotosFechaFin||''}" onchange="S.fotosFechaFin=this.value;loadFotos()"></div>
      </div>
      <button onclick="S.fotosFiltroIng='todos';S.fotosFiltroUbic='';S.fotosFecha='';S.fotosFechaFin='';loadFotos()" style="width:100%;padding:8px;border-radius:var(--r);border:1px solid var(--border2);background:transparent;color:var(--text3);font-family:var(--font);font-size:12px;cursor:pointer">↺ Limpiar filtros</button>
    </div>

    ${data.length===0?'<div class="empty">Sin fotos para los filtros seleccionados</div>'
    :fechas.map(fecha=>{
      const acts=byFecha[fecha]||[];
      const fotosDelDia=acts.reduce((acc,a)=>[...acc,...(a.fotos||'').split('||').filter(Boolean)],[]);
      return`<div style="margin-bottom:18px">
        <!-- DIA HEADER -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)">
          <div>
            <div style="font-size:13px;font-weight:600">${fmtDia(fecha)} ${fmtF(fecha)}</div>
            <div style="font-size:11px;color:var(--text3);font-family:var(--mono)">${acts.length} actividad${acts.length!==1?'es':''} · ${fotosDelDia.length} foto${fotosDelDia.length!==1?'s':''}</div>
          </div>
          <button onclick="descargarFotos(${JSON.stringify(fotosDelDia)},'${fecha}','dia_completo')" style="padding:5px 10px;border-radius:var(--r);border:1px solid var(--accent);background:rgba(200,240,96,.08);color:var(--accent);font-size:11px;cursor:pointer;font-family:var(--font)">↓ Bajar todas</button>
        </div>

        ${acts.map(a=>{
          const fotos=(a.fotos||'').split('||').filter(Boolean);
          if(!fotos.length)return'';
          const ing=Object.values(USERS).find(u=>u.nombre===a.ingeniero_nombre);
          const ingColor=ing?.color||'var(--text3)';
          return`<div style="margin-bottom:12px">
            <!-- ACTIVIDAD META -->
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:7px 10px;background:var(--bg2);border:1px solid var(--border);border-left:3px solid ${a.tipo_personal==='contratista'?'var(--purple)':'var(--accent)'};border-radius:var(--r)">
              <div style="flex:1;min-width:0">
                <div style="font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(a.descripcion)}</div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;font-size:10px;color:var(--text3);margin-top:2px">
            
                  ${a.ingeniero_nombre?`<span style="color:${ingColor}">👤 ${esc(a.ingeniero_nombre)}</span>`:''}
                  ${a.personal_nombre?`<span>👷 ${esc(a.personal_nombre)}</span>`:''}
                  <span class="pill ${(a.estado||'').replace(' ','-')}" style="font-size:9px">${a.estado}</span>
                </div>
              </div>
              <button onclick="descargarFotos(${JSON.stringify(fotos)},'${fecha}','${esc(a.area||'general')}')" style="padding:4px 8px;border-radius:var(--r);border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:10px;cursor:pointer;flex-shrink:0">↓</button>
            </div>
            <!-- FOTO GRID -->
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px">
              ${fotos.map((f,fi)=>`
                <div style="position:relative;aspect-ratio:1;border-radius:var(--r);overflow:hidden;border:1px solid var(--border2)">
                  <img src="${f}" style="width:100%;height:100%;object-fit:cover;cursor:pointer" onclick="verFotoInfo('${f}','${esc(a.descripcion)}','${fecha}','${esc(a.area||'')}','${esc(a.ingeniero_nombre||'')}')" loading="lazy">
                  <div style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.7));padding:4px;font-size:9px;color:white;font-family:var(--mono)">${fi+1}/${fotos.length}</div>
                </div>`).join('')}
            </div>
          </div>`;}).join('')}
      </div>`;}).join('')}
    <div style="height:70px"></div>`;
}

function verFotoInfo(url, desc, fecha, area, ing){
  const viewer=document.getElementById('fviewer');
  const img=document.getElementById('fviewer-img');
  img.src=url;
  let info=document.getElementById('fviewer-info');
  if(!info){
    info=document.createElement('div');
    info.id='fviewer-info';
    info.style.cssText='position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.9));padding:16px;color:white';
    viewer.appendChild(info);
  }
  const areaHtml = area ? '<span>📍 '+esc(area)+'</span>' : '';
  const ingHtml  = ing  ? '<span>👤 '+esc(ing)+'</span>'  : '';
  const safeUrl  = url.replace(/'/g,"\'");
  const safeFecha= fecha.replace(/'/g,"\'");
  const safeArea = (area||'foto').replace(/'/g,"\'");
  info.innerHTML =
    '<div style="font-size:13px;font-weight:500;margin-bottom:4px">'+esc(desc)+'</div>'+
    '<div style="font-size:11px;opacity:.7;display:flex;gap:12px;flex-wrap:wrap">'+
      '<span>📅 '+fmtF(fecha)+'</span>'+areaHtml+ingHtml+
    '</div>'+
    '<button onclick="descargarFotos([\''+safeUrl+'\'],\''+safeFecha+'\',\''+safeArea+'\')" '+
    'style="margin-top:8px;padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:white;font-size:12px;cursor:pointer">↓ Descargar</button>';
  viewer.style.display='flex';
}

// Load tareas
async function loadTareas(){
  renderEnObra();
  try{
    // All non-completed activities dated today or earlier (overdue keep showing until done)
    const all=await sb('obra_actividades?estado=neq.completado&fecha=lte.'+S.fecha+'&order=fecha.asc,created_at.desc&limit=250');
    S.actsActivas=all;
    S.tareas=[];
    renderEnObra();
  }catch(e){ console.warn('Error En Obra:', e.message); }
}

function getFilteredActsActs(){
  return S.actsActivas.filter(function(a){
    if(S.enObraFiltroTipo && a.tipo_personal!==S.enObraFiltroTipo) return false;
    if(S.enObraFiltroContratista && a.personal_nombre!==S.enObraFiltroContratista) return false;
    if(S.enObraFiltroPersonal && a.personal_nombre!==S.enObraFiltroPersonal) return false;
    if(S.enObraFiltroEstado && a.estado!==S.enObraFiltroEstado) return false;
    return true;
  });
}

function getFilteredActsHTML(){
  var acts=getFilteredActsActs();
  if(acts.length===0 && S.actsActivas.length>0){
    return '<div style="font-size:12px;color:var(--text3);padding:10px;text-align:center;font-style:italic">Sin actividades para este filtro</div>';
  }
  if(acts.length===0) return '';

  var parts=[];
  for(var i=0;i<acts.length;i++){
    var a=acts[i];
    var id=a.id||'';
    var desc=esc(a.descripcion||'');
    var area=a.area?'<span>📍 '+esc(a.area)+'</span>':'';
    var pers=a.personal_nombre?'<span>👷 '+esc(a.personal_nombre)+'</span>':'';
    var ing=a.ingeniero_nombre?'<span>👤 '+esc(a.ingeniero_nombre)+'</span>':'';
    var fecha=a.fecha?'<span>📅 Desde '+a.fecha+'</span>':'';
    var pct=a.porcentaje||0;
    var pctBar=pct>0?'<div style="height:4px;background:#e9ecef;border-radius:2px;overflow:hidden;margin-bottom:8px"><div style="height:100%;width:'+Math.min(100,pct)+'%;background:var(--amber);border-radius:2px"></div></div>':'';
    var pctLabel=pct>0?'<span>⚡ '+pct+'%</span>':'';

    var btns='';
    if(canEdit()){
      var onInt="interrumpirActDesdeObra('"+id+"','"+desc.replace(/'/g,"\'")+"')";
      var onDone="marcarActCompletada('"+id+"')";
      var onEdit="goTab('obra');editActById('"+id+"')";
      btns='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">';
      btns+='<button class="tarea-btn amarillo" style="font-size:11px;padding:7px;flex:1" onclick="'+onInt+'">Interrumpir</button>';
      btns+='<button class="tarea-btn verde" style="font-size:11px;padding:7px;flex:1" onclick="'+onDone+'">Lista</button>';
      btns+='<button class="tarea-btn" style="font-size:11px;padding:7px;flex:1" onclick="'+onEdit+'">Editar</button>';
      btns+='</div>';
    }

    parts.push(
      '<div style="background:#fff;border:1px solid rgba(240,184,96,.3);border-left:3px solid var(--amber);border-radius:var(--r2);padding:12px 14px;margin-bottom:8px">'+
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px">'+
          '<div style="flex:1">'+
            '<div style="font-size:13px;font-weight:600">'+desc+'</div>'+
            '<div style="font-size:11px;color:var(--text3);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap">'+area+pers+ing+fecha+pctLabel+'</div>'+
          '</div>'+
          '<span style="font-size:10px;background:#fff3cd;color:#856404;padding:2px 8px;border-radius:8px;font-weight:600;flex-shrink:0">En progreso</span>'+
        '</div>'+
        pctBar+btns+
      '</div>'
    );
  }
  return parts.join('');
}

  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">';

  h+='<div>';

    [{val:'en-progreso',label:'🔄 En progreso'},{val:'pendiente',label:'⏳ Pendiente'},{val:'pausada',label:'⏸ Pausada'}],
    'Todos los estados',

    h+=filtroDropdown('fo-pers', S.enObraFiltroPersonal, propioOpts,

      "S.enObraFiltroPersonal=this.value;S.enObraFiltroTipo=this.value?'propio':'';renderEnObra()");

  // Active filters + clear
  var hasFilters=S.enObraFiltroTipo||S.enObraFiltroContratista||S.enObraFiltroPersonal||S.enObraFiltroEstado;
  if(hasFilters){

// Render En Obra view
function renderEnObra(){
  const el=document.getElementById('c-enobra');
  if(!el) return;
  if(!S.user){
    el.innerHTML=
      '<div class="empty" style="padding:40px 20px">'+
      '<div style="font-size:32px;margin-bottom:12px">🔒</div>'+
      '<div style="font-size:14px;font-weight:500;color:var(--text2);margin-bottom:6px">Inicia sesión para gestionar</div>'+
      '<button class="ibtn primary" id="btn-enobra-login" style="margin:0 auto;display:block">Entrar</button>'+
      '</div>';
    var btn=document.getElementById('btn-enobra-login');
    if(btn) btn.onclick=function(){showLogin();};
    return;
  }

  var acts=getFilteredActsActs();
  var enProgreso=S.actsActivas.filter(function(a){return a.estado==='en-progreso';});
  var pendiente=S.actsActivas.filter(function(a){return a.estado==='pendiente';});
  var pausada=S.actsActivas.filter(function(a){return a.estado==='pausada';});
  var urgentes=S.actsActivas.filter(function(a){return a.prioridad==='urgente'&&a.estado!=='completado';});
  var retrasadas=S.actsActivas.filter(function(a){return a.fecha&&a.fecha<S.fecha&&a.estado!=='completado';});

  el.innerHTML=`
    <!-- HEADER -->
    <div class="obranow-header">
      <div>
        <div style="font-size:14px;font-weight:600">🏗️ En Obra — ${fmtDia(S.fecha)} ${fmtF(S.fecha)}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono)">${S.actsActivas.length} actividad${S.actsActivas.length!==1?'es':''} activas</div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
        ${retrasadas.length?`<span style="background:#ffe3e3;color:#c92a2a;border:1px solid #ffa8a8;font-size:10px;font-family:var(--mono);padding:3px 8px;border-radius:8px;font-weight:700">⏰ ${retrasadas.length} retrasada${retrasadas.length>1?'s':''}</span>`:''}
        ${urgentes.length?`<span style="background:#ffe3e3;color:#e03131;border:1px solid #ffa8a8;font-size:10px;font-family:var(--mono);padding:3px 8px;border-radius:8px">🔴 ${urgentes.length} urgente${urgentes.length>1?'s':''}</span>`:''}
        <button onclick="loadTareas()" style="background:none;border:1.5px solid #dee2e6;border-radius:8px;padding:5px 8px;cursor:pointer;color:#495057;font-size:13px">↺</button>
      </div>
    </div>

    <!-- STATS -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px">
      ${[
        {v:enProgreso.length, l:'En curso',   c:'var(--accent)'},
        {v:retrasadas.length, l:'Retrasadas', c:retrasadas.length>0?'#c92a2a':'var(--text3)'},
        {v:pausada.length,    l:'Pausadas',   c:'var(--amber)'},
        {v:S.actsActivas.length, l:'Total',   c:'var(--text2)'},
      ].map(s=>`<div class="scard"><div class="v" style="color:${s.c};font-size:18px">${s.v}</div><div class="l">${s.l}</div></div>`).join('')}
    </div>

    <!-- FILTROS -->
    ${buildEnObraFiltros()}

    <!-- ACTIVIDADES -->
    ${acts.length===0
      ?`<div class="empty" style="padding:24px">
          <div style="font-size:28px;margin-bottom:8px">👷</div>
          <div style="font-size:13px;font-weight:500;color:var(--text2);margin-bottom:4px">Sin actividades${S.enObraFiltroContratista||S.enObraFiltroTipo?' para este filtro':' activas hoy'}</div>
          <div style="font-size:12px;color:var(--text3)">Toca + para agregar una actividad</div>
        </div>`
      :acts.map(function(a){ return buildActCardObra(a); }).join('')}

    <div style="height:80px"></div>`;
}

// Global registry for act card actions
window._OA = {}; // {key: actId}
var _oaIdx = 0;

function regAct(id){ 
  var k='a'+(++_oaIdx); 
  window._OA[k]=id; 
  return k; 
}

function buildActCardObra(a){
  var id = a.id||'';
  var desc = esc(a.descripcion||'');
  var area = a.area ? '<span>📍 '+esc(a.area)+'</span>' : '';
  var pers = a.personal_nombre ? '<span>👷 '+esc(a.personal_nombre)+'</span>' : '';
  var ing  = a.ingeniero_nombre ? '<span>👤 '+esc(a.ingeniero_nombre)+'</span>' : '';
  var tipo = a.tipo_personal==='contratista' ? '🔨' : '👷';
  var pct  = a.porcentaje||0;

  var EC = {'en-progreso':'#1a56db','pendiente':'#868e96','pausada':'#f08c00','completado':'#2f9e44'};
  var EB = {'en-progreso':'#e8f0fe','pendiente':'#f8f9fa','pausada':'#fff3bf','completado':'#d3f9d8'};
  var EL = {'en-progreso':'▶ En curso','pendiente':'⏳ Pendiente','pausada':'⏸ Pausada','completado':'✓ Lista'};

  var retrasada = a.fecha && a.fecha < today() && a.estado !== 'completado';

// Actions for activities in En Obra
async function accionActObra(id, accion){
  var a=S.actsActivas.find(function(x){return x.id===id;});
  if(!a) return;
  var ahora=hhmm();
  var update={};

  if(accion==='iniciar'){
    update={estado:'en-progreso'};
    a.estado='en-progreso';
  } else if(accion==='completar'){
    update={estado:'completado',porcentaje:100};
    a.estado='completado'; a.porcentaje=100;
    // Remove from actsActivas after a moment
    setTimeout(function(){
      S.actsActivas=S.actsActivas.filter(function(x){return x.id!==id;});
      // Also update S.acts
      var ai=S.acts.findIndex(function(x){return x.id===id;});
      if(ai>=0){S.acts[ai].estado='completado';S.acts[ai].porcentaje=100;}
      renderEnObra(); renderActs(); renderHoy();
    },500);
  } else if(accion==='retomar'){
    update={estado:'en-progreso'};
    a.estado='en-progreso';
  } else if(accion==='urgente'){
    var nuevaPrio=a.prioridad==='urgente'?'normal':'urgente';
    update={prioridad:nuevaPrio};
    a.prioridad=nuevaPrio;
  }

  renderEnObra();
  // Also sync to S.acts
  var ai=S.acts.findIndex(function(x){return x.id===id;});
  if(ai>=0) Object.assign(S.acts[ai],update);

  setSS('syncing','...');
  try{
    await sb('obra_actividades?id=eq.'+id,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify(update)});
    setSS('ok','✓');
    if(accion==='completar'){renderActs();renderHoy();}
  }catch(e){setSS('err','Error');}
}

function goTab(tab){
  // Legacy tab redirects — old internal calls still work
  var legacyMap={enobra:'obra',asistencia:'equipo',actividades:'obra',
    personal:'equipo',penalidades:'equipo',semana:'reportes',historial:'reportes'};
  if(legacyMap[tab]){
    if(tab==='enobra')   S.obraVista='activa';
    if(tab==='actividades') S.obraVista='todas';
    if(tab==='asistencia')  S.equipoVista='asistencia';
    if(tab==='personal')    S.equipoVista='personal';
    if(tab==='penalidades') S.equipoVista='penalidades';
    if(tab==='semana')      S.reportesVista='semana';
    if(tab==='historial')   S.reportesVista='historial';
    tab=legacyMap[tab];
  }
  S.currentTab=tab;
  var VIEWS=['hoy','obra','equipo','reportes','fotos','compras'];
  VIEWS.forEach(function(v){
    var el=document.getElementById('view-'+v);
    if(el) el.classList.toggle('active', v===tab);
  });
  document.querySelectorAll('.tab').forEach(function(b){
    b.classList.toggle('active', b.dataset.tab===tab);
  });
  updateBNav(tab);
  updateFAB();
  if(tab==='hoy')      renderHoy();
  else if(tab==='obra')     renderObra();
  else if(tab==='equipo')   renderEquipo();
  else if(tab==='reportes') renderReportesHub();
  else if(tab==='fotos')    renderFotos();
  else if(tab==='compras')  renderCompras();
}

// ── AUTO-ACTUALIZACIÓN: detectar nueva versión sin borrar acceso directo ──
(function(){
  var _checking=false;
  function checkForUpdate(){
    if(_checking) return;
    _checking=true;
    fetch(location.href+'?_v='+Date.now(),{cache:'no-store',method:'GET'})
      .then(function(r){return r.text();})
      .then(function(html){
        _checking=false;
        var m=html.match(/APP_VERSION='([^']+)'/);
        if(m && m[1] && m[1]!==APP_VERSION){
          // Nueva versión disponible — recargar silenciosamente si no hay modal abierto
          var modal=document.getElementById('modal');
          var modalOpen=modal&&modal.style.display!=='none';
          if(!modalOpen){
            location.reload(true);
          } else {
            // Esperar hasta que el modal cierre
            var _waitClose=setInterval(function(){
              if(!modal||modal.style.display==='none'){
                clearInterval(_waitClose);
                location.reload(true);
              }
            }, 5000);
          }
        }
      })
      .catch(function(){ _checking=false; });
  }
  // Verificar cada 5 minutos
  setInterval(checkForUpdate, 5*60*1000);
  // También verificar cuando la app vuelve al primer plano
  document.addEventListener('visibilitychange',function(){
    if(document.visibilityState==='visible') checkForUpdate();
  });
})();

        </div>`:''}

      <div style="display:flex;flex-wrap:wrap;gap:10px;font-size:12px;color:var(--text2);margin-bottom:6px">
        ${o.proveedor?`<span>🏪 ${esc(o.proveedor)}</span>`:''}
        ${o.fecha?`<span>📅 ${fmtF(o.fecha)}</span>`:''}
        ${o.ingeniero_nombre?`<span>👤 ${esc(o.ingeniero_nombre)}</span>`:''}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
        ${o.monto_estimado?`<div style="background:var(--bg3);border-radius:8px;padding:4px 10px">
          <div style="font-size:10px;color:var(--text3);font-weight:600">ESTIMADO</div>
          <div style="font-size:14px;font-weight:800;color:var(--text)">${fmtMonto(o.monto_estimado)}</div>
        </div>`:''}
        ${o.monto_real?`<div style="background:${diff<0?'#d3f9d8':diff>0?'#ffe3e3':'var(--bg3)'};border-radius:8px;padding:4px 10px">
          <div style="font-size:10px;color:var(--text3);font-weight:600">REAL</div>
          <div style="font-size:14px;font-weight:800;color:${diff<0?'#2f9e44':diff>0?'#e03131':'var(--text)'}">${fmtMonto(o.monto_real)}</div>
        </div>`:''}
        ${diff!==null?`<span style="font-size:11px;font-weight:600;color:${diff<0?'#2f9e44':diff>0?'#e03131':'var(--text3)'}">
          ${diff<0?'▼ Ahorro '+fmtMonto(Math.abs(diff)):diff>0?'▲ Sobre '+fmtMonto(diff):'= Exacto'}
        </span>`:''}
      </div>
      ${o.items?`<div style="margin-top:8px;padding:8px 10px;background:var(--bg3);border-radius:8px;font-size:12px;color:var(--text2);white-space:pre-line;line-height:1.5">${esc(o.items)}</div>`:''}
      ${o.notas?`<div style="margin-top:6px;font-size:12px;color:var(--text3);font-style:italic">💬 ${esc(o.notas)}</div>`:''}
    </div>
    ${canEdit()&&o.estado!=='recibida'&&o.estado!=='cancelada'?`
    <div style="display:flex;border-top:1px solid var(--border)">
      ${o.estado==='borrador'?`<button onclick="cambiarEstadoOrden('${o.id}','pendiente')" style="flex:1;padding:10px;border:none;background:#fffbeb;color:#d97706;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)">▶ Enviar a aprobación</button>`:''}
      ${o.estado==='pendiente'?`<button onclick="cambiarEstadoOrden('${o.id}','aprobada')" style="flex:1;padding:10px;border:none;background:#eff6ff;color:#2563eb;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)">✓ Aprobar</button>`:''}
      ${o.estado==='aprobada'?`<button onclick="cambiarEstadoOrden('${o.id}','recibida')" style="flex:1;padding:10px;border:none;background:#ecfdf5;color:#059669;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)">📦 Marcar recibida</button>`:''}
      <button onclick="cambiarEstadoOrden('${o.id}','cancelada')" style="padding:10px 14px;border:none;border-left:1px solid var(--border);background:#fef2f2;color:#dc2626;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)">✕ Cancelar</button>
    </div>`:''}
  </div>`;
}

function renderCompras(){
  const oc=document.getElementById('c-compras');
  if(!oc) return;

  // Sub-nav
  const subnav=document.getElementById('c-compras-subnav');
  if(subnav){
    subnav.style.cssText=subNavStyle();
    subnav.innerHTML=
      subNavBtn('📋 Todas', !S.comprasEstadoFiltro, "S.comprasEstadoFiltro='';renderCompras()")+
      subNavBtn('⏳ Pendientes', S.comprasEstadoFiltro==='pendiente', "S.comprasEstadoFiltro='pendiente';renderCompras()")+
      subNavBtn('✓ Aprobadas', S.comprasEstadoFiltro==='aprobada', "S.comprasEstadoFiltro='aprobada';renderCompras()")+
      subNavBtn('📦 Recibidas', S.comprasEstadoFiltro==='recibida', "S.comprasEstadoFiltro='recibida';renderCompras()")+
      subNavBtn('📝 Borradores', S.comprasEstadoFiltro==='borrador', "S.comprasEstadoFiltro='borrador';renderCompras()");
  }

  const all=S.compras||[];
  const filtered=S.comprasEstadoFiltro?all.filter(o=>o.estado===S.comprasEstadoFiltro):all;

  // Summary stats
  const totalEst=all.reduce((s,o)=>s+(Number(o.monto_estimado)||0),0);
  const totalReal=all.filter(o=>o.monto_real).reduce((s,o)=>s+(Number(o.monto_real)||0),0);
  const counts={borrador:0,pendiente:0,aprobada:0,recibida:0,cancelada:0};
  all.forEach(o=>{if(counts[o.estado]!==undefined) counts[o.estado]++;});

  const setupMsg = S.comprasError
    ? `<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:var(--r2);padding:14px 16px;margin-bottom:14px;font-size:12px;color:#7f1d1d">
        <div style="font-weight:700;margin-bottom:4px">⚠️ Error al cargar órdenes de compra</div>
        <div>Verifica que la tabla <code>obra_ordenes_compra</code> existe en Supabase y que tiene los permisos correctos.</div>
        <button onclick="loadCompras()" style="margin-top:8px;padding:6px 14px;border-radius:var(--r);border:1.5px solid #dc2626;background:#fff;color:#dc2626;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)">↺ Reintentar</button>
      </div>`
    : '';

  oc.innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px">
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;box-shadow:var(--shadow-xs)">
        <div style="font-size:22px;font-weight:800;color:var(--accent)">${all.length}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">Total OC</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">
          ${counts.pendiente?`<span style="background:#fffbeb;color:#d97706;border:1px solid #fcd34d;border-radius:6px;padding:1px 6px;font-size:10px;font-weight:600">${counts.pendiente} pend.</span>`:''}
          ${counts.aprobada?`<span style="background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;border-radius:6px;padding:1px 6px;font-size:10px;font-weight:600">${counts.aprobada} aprob.</span>`:''}
          ${counts.recibida?`<span style="background:#ecfdf5;color:#059669;border:1px solid #6ee7b7;border-radius:6px;padding:1px 6px;font-size:10px;font-weight:600">${counts.recibida} recib.</span>`:''}
        </div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;box-shadow:var(--shadow-xs)">
        <div style="font-size:16px;font-weight:800;color:var(--text)">${fmtMonto(totalEst)}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">Monto estimado</div>
        ${totalReal?`<div style="font-size:13px;font-weight:700;color:#059669;margin-top:4px">${fmtMonto(totalReal)} real</div>`:''}
      </div>
    </div>
    ${setupMsg}
    ${filtered.length===0
      ?`<div class="empty">${S.comprasEstadoFiltro?'No hay órdenes con ese estado':'Sin órdenes de compra registradas'}<br><br>${canEdit()?'<button class="ibtn primary" onclick="showAddOrden()" style="margin:0 auto">+ Nueva orden</button>':''}</div>`
      :filtered.map(o=>ordenHTML(o)).join('')}
    <div style="height:80px"></div>`;
}

function showAddOrden(id){
  const edit=!!id;
  const o=edit?S.compras.find(x=>x.id===id):null;
  const nextNum='OC-'+(String((S.compras.length||0)+1).padStart(3,'0'));
  const mc=document.getElementById('mcontent');
  mc.innerHTML=`
    <div class="mhandle"></div>
    <h3>🛒 ${edit?'Editar Orden de Compra':'Nueva Orden de Compra'}</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="fw"><label class="fl">Nro. Orden</label>
        <input type="text" id="oc-num" value="${esc(o?.numero_orden||nextNum)}" placeholder="OC-001" style="font-family:var(--mono)"></div>
      <div class="fw"><label class="fl">Fecha</label>
        <input type="date" id="oc-fecha" value="${o?.fecha||today()}"></div>
    </div>
    <div class="fw"><label class="fl">Descripción / Título *</label>
      <input type="text" id="oc-desc" value="${esc(o?.descripcion||'')}" placeholder="Ej: Tuberías PVC para instalación sanitaria..."></div>
    <div class="fw"><label class="fl">Proveedor</label>
      <input type="text" id="oc-prov" value="${esc(o?.proveedor||'')}" placeholder="Nombre de la empresa o persona"></div>
    <div class="fw"><label class="fl">Items / Materiales</label>
      <textarea id="oc-items" class="ta" placeholder="Un ítem por línea, ej:&#10;10 sacos cemento Portland&#10;50 bloques #6&#10;5 galones pintura blanca">${esc(o?.items||'')}</textarea></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="fw"><label class="fl">Monto estimado (RD$)</label>
        <input type="number" id="oc-est" value="${o?.monto_estimado||''}" placeholder="0.00" min="0" step="0.01"></div>
      <div class="fw"><label class="fl">Monto real (RD$)</label>
        <input type="number" id="oc-real" value="${o?.monto_real||''}" placeholder="0.00" min="0" step="0.01"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="fw"><label class="fl">Estado</label>
        <select id="oc-estado" class="sel">
          <option value="borrador" ${(o?.estado||'borrador')==='borrador'?'selected':''}>📝 Borrador</option>
          <option value="pendiente" ${o?.estado==='pendiente'?'selected':''}>⏳ Pendiente</option>
          <option value="aprobada" ${o?.estado==='aprobada'?'selected':''}>✓ Aprobada</option>
          <option value="recibida" ${o?.estado==='recibida'?'selected':''}>📦 Recibida</option>
          <option value="cancelada" ${o?.estado==='cancelada'?'selected':''}>✕ Cancelada</option>
        </select></div>
      <div class="fw"><label class="fl">Responsable</label>
        <select id="oc-ing" class="sel">
          <option value="">Sin asignar</option>
          ${Object.values(USERS).map(u=>`<option value="${u.nombre}" ${o?.ingeniero_nombre===u.nombre?'selected':''}>${u.nombre}</option>`).join('')}
        </select></div>
    </div>
    <div class="fw"><label class="fl">Notas</label>
      <textarea id="oc-notas" class="ta" placeholder="Observaciones, condiciones de entrega...">${esc(o?.notas||'')}</textarea></div>
    <div class="mactions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn primary" onclick="saveOrden(${edit?`'${id}'`:'null'})">💾 Guardar</button>
    </div>`;
  openModal();
  setTimeout(()=>document.getElementById('oc-desc').focus(),100);
}

function showEditOrden(id){ showAddOrden(id); }

async function saveOrden(id){
  const desc=document.getElementById('oc-desc').value.trim();
  if(!desc){document.getElementById('oc-desc').focus();return;}
  const ingNombre=document.getElementById('oc-ing').value;
  const ingObj=ingNombre?Object.entries(USERS).find(([k,u])=>u.nombre===ingNombre):null;
  const data={
    numero_orden: document.getElementById('oc-num').value.trim()||'OC-???',
    fecha:        document.getElementById('oc-fecha').value,
    descripcion:  desc,
    proveedor:    document.getElementById('oc-prov').value.trim(),
    items:        document.getElementById('oc-items').value.trim(),
    monto_estimado: parseFloat(document.getElementById('oc-est').value)||null,
    monto_real:     parseFloat(document.getElementById('oc-real').value)||null,
    estado:       document.getElementById('oc-estado').value,
    notas:        document.getElementById('oc-notas').value.trim(),
    ingeniero_nombre: ingNombre||null,
    ingeniero_id:    ingObj?ingObj[0]:null,
  };
  closeModal();
  setSS('syncing','Guardando...');
  try{
    if(id&&id!=='null'){
      await sb('obra_ordenes_compra?id=eq.'+id,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify(data)});
      const idx=S.compras.findIndex(x=>x.id===id);
      if(idx>=0) S.compras[idx]={...S.compras[idx],...data};
    } else {
      const newOc={id:uid(),created_at:new Date().toISOString(),...data};
      await sb('obra_ordenes_compra',{method:'POST',prefer:'return=minimal',body:JSON.stringify(newOc)});
      S.compras.unshift(newOc);
    }
    setSS('ok','✓ Guardado');
    renderCompras();
  }catch(e){setSS('err','Error guardando: '+e.message);}
}

async function cambiarEstadoOrden(id,nuevoEstado){
  const o=S.compras.find(x=>x.id===id);
  if(!o) return;
  o.estado=nuevoEstado;
  renderCompras();
  try{
    await sb('obra_ordenes_compra?id=eq.'+id,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({estado:nuevoEstado})});
    setSS('ok','✓ Estado actualizado');
  }catch(e){setSS('err','Error');}
}

function confirmDeleteOrden(id){
  const o=S.compras.find(x=>x.id===id);
  if(!o) return;
  document.getElementById('mcontent').innerHTML=`
    <div class="mhandle"></div>
    <h3>🗑️ ¿Eliminar orden?</h3>
    <p style="color:var(--text2);font-size:14px;margin-bottom:16px">Se eliminará permanentemente <strong>${esc(o.numero_orden)} — ${esc(o.descripcion)}</strong>.</p>
    <div class="mactions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn danger" onclick="deleteOrden('${id}')">Eliminar</button>
    </div>`;
  openModal();
}

async function deleteOrden(id){
  if(!isAdmin()){alert('Solo el administrador puede eliminar órdenes de compra.');closeModal();return;}
  closeModal();
  S.compras=S.compras.filter(x=>x.id!==id);
  renderCompras();
  setSS('syncing','Eliminando...');
  try{
    await sb('obra_ordenes_compra?id=eq.'+id,{method:'DELETE',prefer:'return=minimal'});
    setSS('ok','✓ Eliminada');
  }catch(e){setSS('err','Error eliminando');}
}

</script>
</body>
</html>
