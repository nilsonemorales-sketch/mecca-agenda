  var EB = {'en-progreso':'#e8f0fe','pendiente':'#f8f9fa','pausada':'#fff3bf','completado':'#d3f9d8'};
  var EL = {'en-progreso':'▶ En curso','pendiente':'⏳ Pendiente','pausada':'⏸ Pausada','completado':'✓ Lista'};

  var ec = EC[a.estado]||'#868e96';
  var eb = EB[a.estado]||'#f8f9fa';
  var el = EL[a.estado]||a.estado;
  var bc = a.estado==='en-progreso'?'rgba(26,86,219,.3)':a.estado==='pausada'?'rgba(240,184,96,.4)':'#dee2e6';

  var k = regAct(id);

  var btns = '';
  if(canEdit()){
    if(a.estado==='pendiente'){
      btns = '<div class="tarea-acciones">'+
        btn('verde',   'k_iniciar_'+k,   '▶ Iniciar',    "accionActObra(window._OA['"+k+"'],'iniciar')")+
        btn('',        'k_urgente_'+k,   a.prioridad==='urgente'?'↓ Normal':'🔴 Urgente', "accionActObra(window._OA['"+k+"'],'urgente')")+
        btn('',        'k_edit_'+k,      '✏️ Editar',    "goObraEdit('"+k+"')")+
        '</div>';
    } else if(a.estado==='en-progreso'){
      btns = '<div class="tarea-acciones">'+
        btn('amarillo','k_pausa_'+k,     '⏸ Interrumpir', "pausarDesdeObra('"+k+"')")+
        btn('verde',   'k_comp_'+k,      '✓ Completar',   "accionActObra(window._OA['"+k+"'],'completar')")+
        btn('',        'k_edit2_'+k,     '✏️ Editar',     "goObraEdit('"+k+"')")+
        '</div>';
    } else if(a.estado==='pausada'){
      btns = '<div class="tarea-acciones">'+
        btn('accent',  'k_ret_'+k,       '↺ Retomar',    "accionActObra(window._OA['"+k+"'],'retomar')")+
        btn('verde',   'k_comp2_'+k,     '✓ Completar',  "accionActObra(window._OA['"+k+"'],'completar')")+
        btn('',        'k_edit3_'+k,     '✏️ Editar',    "goObraEdit('"+k+"')")+
        '</div>';
    }
  }

  return '<div style="background:#fff;border:1.5px solid '+bc+';border-left:3px solid '+ec+';border-radius:var(--r2);padding:12px 14px;margin-bottom:10px">'+
    '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px">'+
      '<div style="flex:1">'+
        '<div style="font-size:13px;font-weight:600">'+tipo+' '+desc+'</div>'+
            (a.area?'<div style="display:inline-block;background:#e8f0fe;color:var(--accent);border:1px solid rgba(26,86,219,.25);border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700;margin:4px 0">📍 '+esc(a.area)+'</div>':'<div style="display:inline-block;background:#fff3cd;color:#856404;border:1px solid #ffc107;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:600;margin:4px 0;cursor:pointer" onclick="setArea(\''+id+'\')" >⚠️ Sin ubicacion — toca para agregar</div>')+
            '<div style="font-size:11px;color:var(--text3);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap">'+pers+ing+'<span>📅 '+a.fecha+'</span></div>'+
      '<span style="font-size:10px;background:'+eb+';color:'+ec+';padding:3px 9px;border-radius:8px;font-weight:600;flex-shrink:0">'+el+'</span>'+
    '</div>'+
    (pct>0?'<div style="height:4px;background:#e9ecef;border-radius:2px;overflow:hidden;margin-bottom:8px"><div style="height:100%;width:'+Math.min(100,pct)+'%;background:'+ec+';border-radius:2px"></div></div>':'')+
    (a.notas?'<div style="font-size:11px;color:var(--text3);margin-bottom:6px;padding:5px 8px;background:#f8f9fa;border-radius:6px">'+esc(a.notas)+'</div>':'')+
    btns+
  '</div>';
}

function btn(cls, id, label, oc){
  return '<button id="'+id+'" class="tarea-btn '+cls+'" onclick="'+oc+'">'+label+'</button>';
}

function goObraEdit(k){
  var id = window._OA[k];
  if(!id) return;
  goTab('actividades', null);
  editActById(id);
}

function pausarDesdeObra(k){
  var id = window._OA[k];
  if(!id) return;
  var a = S.actsActivas.find(function(x){return x.id===id;});
  mostrarPausaObra(id, a ? (a.descripcion||'') : '');
}


// Actions for activities in En Obra
async function accionActObra(id, accion){
  var a=S.actsActivas.find(function(x){return x.id===id;});
  if(!a) return;
  var ahora=hhmm();
  var update={};

  if(accion==='iniciar'){
    update={estado:'en-progreso'};
    a.estado='en-progreso';
  } else if(accion==='completar'){
    update={estado:'completado',porcentaje:100};
    a.estado='completado'; a.porcentaje=100;
    // Remove from actsActivas after a moment
    setTimeout(function(){
      S.actsActivas=S.actsActivas.filter(function(x){return x.id!==id;});
      // Also update S.acts
      var ai=S.acts.findIndex(function(x){return x.id===id;});
      if(ai>=0){S.acts[ai].estado='completado';S.acts[ai].porcentaje=100;}
      renderEnObra(); renderActs(); renderHoy();
    },500);
  } else if(accion==='retomar'){
    update={estado:'en-progreso'};
    a.estado='en-progreso';
  } else if(accion==='urgente'){
    var nuevaPrio=a.prioridad==='urgente'?'normal':'urgente';
    update={prioridad:nuevaPrio};
    a.prioridad=nuevaPrio;
  }

  renderEnObra();
  // Also sync to S.acts
  var ai=S.acts.findIndex(function(x){return x.id===id;});
  if(ai>=0) Object.assign(S.acts[ai],update);

  setSS('syncing','...');
  try{
    await sb('obra_actividades?id=eq.'+id,{method:'PATCH',prefer:'return=minimal',body:JSON.stringify(update)});
    setSS('ok','✓');
    if(accion==='completar'){renderActs();renderHoy();}
  }catch(e){setSS('err','Error');}
}

function mostrarPausaObra(id, desc){
  var mc=document.getElementById('mcontent');
  mc.innerHTML=
    '<div class="mhandle"></div>'+
    '<h3>⏸ Interrumpir actividad</h3>'+
    '<div style="background:#f8f9fa;border:1px solid #dee2e6;border-radius:var(--r);padding:10px 12px;margin-bottom:14px;font-size:13px;font-weight:500">'+desc+'</div>'+
    '<div class="fw"><label class="fl">¿Por qué se interrumpe?</label>'+
    '<select id="pausa-motivo" class="sel" style="font-size:14px">'+
    '<option value="Falta de material">📦 Falta de material</option>'+
    '<option value="Tarea urgente">🔴 Surgió tarea urgente</option>'+
    '<option value="Instrucción del ingeniero">👤 Instrucción del ingeniero</option>'+
    '<option value="Espera de otro trabajador">👷 Espera de otro trabajador</option>'+
    '<option value="Descanso / almuerzo">☕ Descanso / almuerzo</option>'+
    '<option value="Problema técnico">🔧 Problema técnico</option>'+
    '</select></div>'+
    '<div class="mactions">'+
    '<button class="btn" onclick="closeModal()">Cancelar</button>'+
    '<button class="btn" style="background:#fff3bf;border-color:#f08c00;color:#7c5a00" id="btn-solo-pausar">⏸ Solo pausar</button>'+
    '<button class="btn primary" id="btn-pausar-nueva">⏸ + Nueva actividad</button>'+
    '</div>';
  openModal();
  document.getElementById('btn-solo-pausar').onclick=async function(){
    var motivo=document.getElementById('pausa-motivo').value;
    closeModal();
    var a=S.actsActivas.find(function(x){return x.id===id;});
    if(a){a.estado='pausada';a.notas=(a.notas?a.notas+' | ':'')+motivo+' ('+hhmm()+')';}
    renderEnObra();
    await sb('obra_actividades?id=eq.'+id,{method:'PATCH',prefer:'return=minimal',
      body:JSON.stringify({estado:'pausada',notas:(a?a.notas:'')})});
    setSS('ok','✓ Pausada');
  };
  document.getElementById('btn-pausar-nueva').onclick=function(){
    var motivo=document.getElementById('pausa-motivo').value;
    closeModal();
    var a=S.actsActivas.find(function(x){return x.id===id;});
    if(a){a.estado='pausada';a.notas=(a.notas?a.notas+' | ':'')+motivo+' ('+hhmm()+')';}
    sb('obra_actividades?id=eq.'+id,{method:'PATCH',prefer:'return=minimal',
      body:JSON.stringify({estado:'pausada',notas:(a?a.notas:'')})}).catch(function(){});
    renderEnObra();
    showAddActSmart();
  };
}
// ── NAVIGATION ────────────────────────────────────────────────
function goTab(tab, payload){
  S.currentTab=tab;
  var views={
    enobra:"view-enobra",hoy:"view-hoy",asistencia:"view-asistencia",
    actividades:"view-actividades",reportes:"view-reportes",semana:"view-semana",
    penalidades:"view-penalidades",personal:"view-personal",
    historial:"view-historial",fotos:"view-fotos"
  };
  Object.keys(views).forEach(function(k){
    var el=document.getElementById(views[k]);
    if(el) el.classList.toggle("active", k===tab);
  });
  document.querySelectorAll(".tab").forEach(function(b){
    b.classList.toggle("active", b.dataset.tab===tab);
  });
  updateBNav(tab);
  if(tab==="hoy") renderHoy();
  else if(tab==="asistencia") renderAsist();
  else if(tab==="actividades") renderActs();
  else if(tab==="reportes") renderReportes();
  else if(tab==="enobra"){ renderEnObra(); loadTareas(); }
  else if(tab==="penalidades") renderPens();
  else if(tab==="personal") renderPersonal();
  else if(tab==="historial") renderHistorial();
  else if(tab==="fotos") renderFotos();
  else if(tab==="semana") renderSemana();
}

// ── DRAWER & NAV HELPERS ──────────────────────────
function toggleDrawer(){
  var d=document.getElementById('drawer');
  var o=document.getElementById('overlay');
  if(d) d.classList.toggle('open');
  if(o) o.classList.toggle('show');
}
function closeDrawer(){
  var d=document.getElementById('drawer');
  var o=document.getElementById('overlay');
  if(d) d.classList.remove('open');
  if(o) o.classList.remove('show');
}
function goTabD(tab){
  closeDrawer();
  goTab(tab,null);
}
function switchTabD(tab){ goTabD(tab); }
function updateBNav(tab){
  document.querySelectorAll('.bnav-btn').forEach(function(b){
    b.classList.toggle('active', b.id==='bn-'+tab);
  });
}





// ── MODAL ─────────────────────────────────────────
function openModal(){
  var m=document.getElementById('modal');
  if(m){ m.style.display='flex'; document.body.style.overflow='hidden'; }
}
function closeModal(){
  var m=document.getElementById('modal');
  if(m){ m.style.display='none'; document.body.style.overflow=''; }
  var mc=document.getElementById('mcontent');
  if(mc) mc.innerHTML='';
}
